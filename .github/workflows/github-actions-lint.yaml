# actionlint と ghalint を使って GitHub Actions の静的解析する
# - actionlint: https://github.com/rhysd/actionlint
# - ghalint: https://github.com/suzuki-shunsuke/ghalint
name: github-actions-lint

on:
  workflow_call:
  pull_request:
    paths:
      - .github/workflows/*.yaml
      - .github/workflows/*.yml

env:
  ACTIONLINT_OS: linux
  ACTIONLINT_ARCH: amd64
  ACTIONLINT_VERSION: 1.7.11

  GHALINT_OS: linux
  GHALINT_ARCH: amd64
  GHALINT_VERSION: 1.5.5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - name: Download actionlint
        run: |
          ASSET="actionlint_${ACTIONLINT_VERSION}_${ACTIONLINT_OS}_${ACTIONLINT_ARCH}.tar.gz"
          BASE="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl -fsSL -o "${ASSET}" "${BASE}/${ASSET}"
          curl -fsSL -o actionlint_checksums.txt "${BASE}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep " ${ASSET}$" actionlint_checksums.txt | shasum -a 256 -c -
          tar xzf "${ASSET}"
          ./actionlint -version

      - name: Run actionlint
        run: ./actionlint -color

      - name: Download ghalint
        run: |
          ASSET="ghalint_${GHALINT_VERSION}_${GHALINT_OS}_${GHALINT_ARCH}.tar.gz"
          BASE="https://github.com/suzuki-shunsuke/ghalint/releases/download/v${GHALINT_VERSION}"
          curl -fsSL -o "${ASSET}" "${BASE}/${ASSET}"
          curl -fsSL -o ghalint_checksums.txt "${BASE}/ghalint_${GHALINT_VERSION}_checksums.txt"
          grep " ${ASSET}$" ghalint_checksums.txt | shasum -a 256 -c -
          tar xzf "${ASSET}"
          ./ghalint version

      - name: Run ghalint
        run: ./ghalint run
